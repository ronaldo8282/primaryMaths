<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小五小數乘法練習 🧮</title>
  <style>
    body {
      font-family: 'Comic Sans MS', 'Microsoft JhengHei', Arial, sans-serif;
      background: linear-gradient(135deg, #a8e6cf, #dcedc1);
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 1050px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    header {
      background: #4CAF50;
      color: white;
      padding: 20px;
      text-align: center;
    }
    h1 { margin: 0; font-size: 2.3em; }
    .info { text-align: center; padding: 12px; background: #f0f8f0; font-size: 1.2em; }

    .questions-container { padding: 30px 40px; }
    .question-item {
      display: flex;
      align-items: center;
      margin: 22px 0;
      font-size: 1.65em;
      gap: 15px;
    }
    .question-number { font-weight: bold; color: #4CAF50; width: 45px; }
    input {
      font-size: 1.5em;
      padding: 10px 15px;
      width: 190px;
      text-align: center;
      border: 3px solid #4CAF50;
      border-radius: 12px;
    }

    .btn {
      font-size: 1.4em;
      padding: 12px 32px;
      margin: 20px 10px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    .btn-submit { background: #FF9800; color: white; }
    .btn-next { background: #2196F3; color: white; }
    .btn-new { background: #4CAF50; color: white; }

    .feedback {
      margin-top: 20px;
      padding: 25px;
      background: #f9f9f9;
      border-radius: 15px;
    }
    .result {
      margin: 22px 0;
      padding: 18px;
      border-radius: 12px;
      font-size: 1.35em;
      line-height: 1.7;
    }
    .correct { background: #e8f5e9; border-left: 6px solid #4CAF50; }
    .wrong { background: #ffebee; border-left: 6px solid #f44336; }

    .column-method {
      background: #fff;
      padding: 16px 20px;
      border: 3px dashed #4CAF50;
      border-radius: 12px;
      margin: 12px 0;
      font-family: monospace;
      font-size: 1.3em;
      white-space: pre;
      line-height: 1.5;
      overflow-x: auto;
      text-align: right;
      color: #2c3e50;
    }

    .explain {
      font-size: 1em;
      color: #555;
      margin-top: 10px;
      padding-left: 10px;
    }
    .summary {
      font-size: 1.95em;
      text-align: center;
      margin: 25px 0;
      font-weight: bold;
      color: #2c3e50;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🌟 小五小數乘法練習 🌟</h1>
    </header>

    <div class="info">
      一次練習 10 題，請全部答完後按「提交答案」
    </div>

    <div class="questions-container" id="questions-container"></div>

    <div style="text-align: center; padding: 20px;">
      <button class="btn btn-submit" onclick="submitAnswers()">提交答案 ✅</button>
      <button class="btn btn-next" onclick="nextSet()" id="nextBtn" style="display:none;">下一組 10 題 →</button>
      <button class="btn btn-new" onclick="startNewSet()">重新開始 🔄</button>
    </div>

    <div class="feedback" id="feedback" style="display:none;"></div>
  </div>

  <script>
    let currentQuestions = [];

    function generateQuestion(level) {
      let a, b;
      if (level === 'normal') {
        // Normal: 1 decimal × 1 decimal (easy)
        a = (Math.random() * 9 + 1).toFixed(1);
        b = (Math.random() * 6 + 1).toFixed(1);
      } else if (level === 'medium') {
        // Medium: mix of 1 and 2 decimals, moderate numbers
        a = (Math.random() * 25 + 2).toFixed(Math.random() > 0.5 ? 1 : 2);
        b = (Math.random() * 12 + 1).toFixed(Math.random() > 0.5 ? 1 : 2);
      } else {
        // Hard (New suitable level): 1-decimal × 2-decimal or 2-decimal × 1-decimal
        if (Math.random() < 0.5) {
          a = (Math.random() * 30 + 5).toFixed(1);   // 1 decimal place
          b = (Math.random() * 15 + 2).toFixed(2);   // 2 decimal places
        } else {
          a = (Math.random() * 30 + 5).toFixed(2);   // 2 decimal places
          b = (Math.random() * 15 + 2).toFixed(1);   // 1 decimal place
        }
      }

      const numA = parseFloat(a);
      const numB = parseFloat(b);
      const product = numA * numB;
      const correct = product.toFixed(4).replace(/\.?0+$/, '');

      return { q: `${numA} × ${numB}`, a: numA, b: numB, answer: correct };
    }

    function createNewSet() {
      currentQuestions = [];
      const counts = { normal: 3, medium: 3, hard: 4 };
      for (let level in counts) {
        for (let i = 0; i < counts[level]; i++) {
          currentQuestions.push(generateQuestion(level));
        }
      }
      currentQuestions.sort(() => Math.random() - 0.5);
    }

    function displayQuestions() {
      const container = document.getElementById('questions-container');
      container.innerHTML = '';
      currentQuestions.forEach((q, index) => {
        const div = document.createElement('div');
        div.className = 'question-item';
        div.innerHTML = `
          <span class="question-number">${index + 1}.</span>
          <span class="question-text">${q.q} = </span>
          <input type="text" id="ans-${index}" placeholder="答案" autocomplete="off">
        `;
        container.appendChild(div);
      });
    }

    // Safe Step-by-Step Column Method (直式方法)
    function getColumnMethod(a, b, correctAnswer) {
      const decA = (a.toString().split('.')[1] || '').length;
      const decB = (b.toString().split('.')[1] || '').length;
      const totalDec = decA + decB;

      const intA = Math.round(a * Math.pow(10, decA));
      const intB = Math.round(b * Math.pow(10, decB));

      const sA = intA.toString();
      const sB = intB.toString();
      const width = Math.max(sA.length, sB.length) + 5;

      let lines = [];

      lines.push(' '.repeat(width - sA.length) + sA);
      lines.push('×' + ' '.repeat(width - sB.length - 1) + sB);
      lines.push('-'.repeat(width));

      let maxLen = 0;
      const partials = [];

      for (let i = 0; i < sB.length; i++) {
        const digit = parseInt(sB[sB.length - 1 - i]);
        const partial = intA * digit;
        let line = partial.toString() + '0'.repeat(i);
        partials.push(line);
        maxLen = Math.max(maxLen, line.length);
      }

      partials.forEach((line, idx) => {
        const padding = ' '.repeat(maxLen - line.length);
        const digit = sB[sB.length - 1 - idx];
        const shift = idx > 0 ? '0'.repeat(idx) : '';
        lines.push(padding + line + '   ← × ' + digit + shift);
      });

      lines.push('-'.repeat(maxLen + 3));

      const finalInt = (intA * intB).toString();
      lines.push(' '.repeat(maxLen - finalInt.length + 1) + finalInt);
      lines.push('='.repeat(maxLen + 3));

      let resultStr = correctAnswer;
      if (totalDec > 0) {
        let temp = finalInt.padStart(totalDec + 1, '0');
        const dotPos = temp.length - totalDec;
        resultStr = temp.slice(0, dotPos) + '.' + temp.slice(dotPos);
        if (resultStr.startsWith('.')) resultStr = '0' + resultStr;
      }
      lines.push(' '.repeat(maxLen - resultStr.length + 2) + resultStr);

      let html = `<div class="column-method">${lines.join('\n')}</div>`;
      html += `<div class="explain">
        📌 直式計算步驟說明：<br>
        1. 先忽略小數點，當成整數相乘<br>
        2. 兩個數共有 <strong>${totalDec}</strong> 位小數<br>
        3. 最後從右邊數 <strong>${totalDec}</strong> 位，點上小數點
      </div>`;

      return html;
    }

    function submitAnswers() {
      let score = 0;
      let feedbackHTML = `<div class="summary">你的分數： <span id="score"></span> / 10</div>`;

      currentQuestions.forEach((q, index) => {
        const userInput = document.getElementById(`ans-${index}`).value.trim();
        const userNum = parseFloat(userInput);
        const correctNum = parseFloat(q.answer);
        const isCorrect = !isNaN(userNum) && Math.abs(userNum - correctNum) < 0.0001;

        if (isCorrect) score++;

        feedbackHTML += `
          <div class="result ${isCorrect ? 'correct' : 'wrong'}">
            <strong>${index + 1}. ${q.q} = </strong>
            ${isCorrect ? 
              `<span style="color:#4CAF50">✅ 正確！</span>` : 
              `<span style="color:#f44336">❌ 錯誤</span>（你輸入：${userInput || '未填'}）`}
            <br><br>
            正確答案： <strong>${q.answer}</strong>
            ${getColumnMethod(q.a, q.b, q.answer)}
          </div>`;
      });

      feedbackHTML += `<div style="text-align:center; margin-top:30px;">
        <button class="btn btn-next" onclick="nextSet()">下一組 10 題 →</button>
      </div>`;

      document.getElementById('feedback').innerHTML = feedbackHTML;
      document.getElementById('feedback').style.display = 'block';
      document.getElementById('score').textContent = score;

      document.querySelector('.btn-submit').style.display = 'none';
      document.getElementById('nextBtn').style.display = 'inline-block';
    }

    function nextSet() {
      createNewSet();
      displayQuestions();
      document.getElementById('feedback').style.display = 'none';
      document.querySelector('.btn-submit').style.display = 'inline-block';
      document.getElementById('nextBtn').style.display = 'none';
    }

    function startNewSet() {
      createNewSet();
      displayQuestions();
      document.getElementById('feedback').style.display = 'none';
      document.querySelector('.btn-submit').style.display = 'inline-block';
      document.getElementById('nextBtn').style.display = 'none';
    }

    window.onload = startNewSet;
  </script>
</body>
</html>
