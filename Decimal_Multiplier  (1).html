<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decimal Multiplication Practice 🧮</title>
  <style>
    body {
      font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
      background: linear-gradient(135deg, #a8e6cf, #dcedc1);
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    header {
      background: #4CAF50;
      color: white;
      padding: 20px;
      text-align: center;
    }
    h1 { margin: 0; font-size: 2.2em; }
    .score {
      font-size: 1.4em;
      margin: 10px 0;
    }
    .progress {
      height: 12px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
      margin: 15px 20px;
    }
    .progress-bar {
      height: 100%;
      background: #4CAF50;
      width: 0%;
      transition: width 0.4s;
    }
    .question-area {
      padding: 30px 40px;
      min-height: 200px;
      text-align: center;
    }
    .question {
      font-size: 2.5em;
      margin: 30px 0;
      color: #2c3e50;
    }
    input {
      font-size: 1.8em;
      padding: 12px 20px;
      width: 200px;
      text-align: center;
      border: 3px solid #4CAF50;
      border-radius: 12px;
    }
    button {
      font-size: 1.4em;
      padding: 12px 30px;
      margin: 15px 8px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    .btn-check { background: #4CAF50; color: white; }
    .btn-next { background: #2196F3; color: white; }
    .btn-new { background: #FF9800; color: white; }
    .feedback {
      font-size: 1.6em;
      margin: 20px 0;
      min-height: 50px;
    }
    .correct { color: #4CAF50; }
    .wrong { color: #f44336; }
    .stats {
      display: flex;
      justify-content: space-around;
      background: #f9f9f9;
      padding: 15px;
      font-size: 1.2em;
    }
    .level { font-size: 0.9em; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🌟 Decimal Multiplication Practice 🌟</h1>
      <div class="score">Score: <span id="score">0</span>/30</div>
    </header>

    <div class="progress"><div class="progress-bar" id="progress"></div></div>

    <div class="question-area">
      <div class="level" id="level-display">Level: Normal</div>
      <div class="question" id="question">Click "Start New Quiz" to begin!</div>
      
      <input type="text" id="answer" placeholder="Your answer" autocomplete="off">
      <br><br>
      
      <button class="btn-check" onclick="checkAnswer()">Check Answer ✅</button>
      <button class="btn-next" onclick="nextQuestion()" style="display:none;" id="nextBtn">Next Question →</button>
      <button class="btn-new" onclick="startNewQuiz()">Start New Quiz 🔄</button>

      <div class="feedback" id="feedback"></div>
    </div>

    <div class="stats">
      <div>Normal: <span id="normal-count">0</span>/9</div>
      <div>Medium: <span id="medium-count">0</span>/9</div>
      <div>Hard: <span id="hard-count">0</span>/12</div>
    </div>
  </div>

  <script>
    let questions = [];
    let currentIndex = 0;
    let score = 0;
    let answered = [];

    // Generate one random decimal multiplication question based on level
    function generateQuestion(level) {
      let a, b, decimalsA, decimalsB;

      if (level === 'normal') {
        // Normal: 1 decimal place × 1 decimal place, smaller numbers
        a = (Math.random() * 9 + 1).toFixed(1); // 1.0 to 9.9
        b = (Math.random() * 5 + 1).toFixed(1); // 1.0 to 5.9
        decimalsA = 1; decimalsB = 1;
      } else if (level === 'medium') {
        // Medium: mix of 1 and 2 decimal places
        a = (Math.random() * 20 + 1).toFixed(Math.random() > 0.5 ? 1 : 2);
        b = (Math.random() * 8 + 1).toFixed(Math.random() > 0.5 ? 1 : 2);
      } else { // hard
        // Hard: 2 decimal places, larger numbers
        a = (Math.random() * 50 + 5).toFixed(2);
        b = (Math.random() * 12 + 2).toFixed(2);
      }

      const numA = parseFloat(a);
      const numB = parseFloat(b);
      const correctAnswer = (numA * numB).toFixed(4).replace(/0+$/, '').replace(/\.$/, ''); // clean trailing zeros

      return {
        q: `${numA} × ${numB} = ?`,
        answer: correctAnswer,
        level: level
      };
    }

    function startNewQuiz() {
      questions = [];
      score = 0;
      currentIndex = 0;
      answered = [];

      // 30% Normal (9), 30% Medium (9), 40% Hard (12)
      for (let i = 0; i < 9; i++) questions.push(generateQuestion('normal'));
      for (let i = 0; i < 9; i++) questions.push(generateQuestion('medium'));
      for (let i = 0; i < 12; i++) questions.push(generateQuestion('hard'));

      // Shuffle the questions
      questions.sort(() => Math.random() - 0.5);

      document.getElementById('score').textContent = '0';
      document.getElementById('progress').style.width = '0%';
      updateLevelCounts();

      currentIndex = 0;
      loadQuestion();
    }

    function updateLevelCounts() {
      let n = 0, m = 0, h = 0;
      questions.forEach(q => {
        if (q.level === 'normal') n++;
        else if (q.level === 'medium') m++;
        else h++;
      });
      document.getElementById('normal-count').textContent = '0';
      document.getElementById('medium-count').textContent = '0';
      document.getElementById('hard-count').textContent = '0';
    }

    function loadQuestion() {
      if (currentIndex >= questions.length) {
        document.getElementById('question').innerHTML = `
          <strong>🎉 Quiz Complete!</strong><br>
          Your final score: ${score} / 30
        `;
        document.getElementById('answer').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'none';
        return;
      }

      const q = questions[currentIndex];
      document.getElementById('question').textContent = q.q;
      document.getElementById('level-display').textContent = `Level: ${q.level.charAt(0).toUpperCase() + q.level.slice(1)}`;
      
      document.getElementById('answer').value = '';
      document.getElementById('answer').style.display = 'inline-block';
      document.getElementById('feedback').innerHTML = '';
      document.getElementById('nextBtn').style.display = 'none';

      // Update progress
      document.getElementById('progress').style.width = `${(currentIndex / questions.length) * 100}%`;
    }

    function checkAnswer() {
      const userAnswer = document.getElementById('answer').value.trim();
      const correct = questions[currentIndex].answer;

      const feedbackEl = document.getElementById('feedback');
      const nextBtn = document.getElementById('nextBtn');

      if (!userAnswer) {
        feedbackEl.innerHTML = `<span style="color:orange">Please enter an answer!</span>`;
        return;
      }

      // Compare with tolerance for floating point issues
      const userNum = parseFloat(userAnswer);
      const correctNum = parseFloat(correct);

      if (Math.abs(userNum - correctNum) < 0.0001) {
        feedbackEl.innerHTML = `<span class="correct">✅ Correct! Well done!</span>`;
        score++;
        document.getElementById('score').textContent = score;
      } else {
        feedbackEl.innerHTML = `<span class="wrong">❌ Oops! The correct answer is ${correct}</span>`;
      }

      document.getElementById('answer').style.display = 'none';
      nextBtn.style.display = 'inline-block';
    }

    function nextQuestion() {
      currentIndex++;
      loadQuestion();
    }

    // Allow pressing Enter key to check answer
    document.getElementById('answer').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        checkAnswer();
      }
    });

    // Start the first quiz automatically when page loads
    window.onload = startNewQuiz;
  </script>
</body>
</html>
